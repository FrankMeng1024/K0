# K0 Backend — nginx reverse proxy config
# Save to: /etc/nginx/sites-available/k0-api
# Enable: ln -s /etc/nginx/sites-available/k0-api /etc/nginx/sites-enabled/k0-api
# SSL: certbot --nginx -d api.k0.yiiling.cn

server {
    listen 80;
    server_name api.k0.yiiling.cn;
    # Certbot will auto-insert HTTPS redirect here
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.k0.yiiling.cn;

    # SSL — filled in by certbot
    ssl_certificate /etc/letsencrypt/live/api.k0.yiiling.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.k0.yiiling.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Logging
    access_log /var/log/nginx/k0-api.access.log;
    error_log  /var/log/nginx/k0-api.error.log;

    # Proxy to Docker container on port 3002
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts generous for GLM AI calls (can take 30s+)
        proxy_connect_timeout  10s;
        proxy_send_timeout     90s;
        proxy_read_timeout     90s;
    }

    # Health check — allow public, no auth
    location /health {
        proxy_pass http://127.0.0.1:3002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
