<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

<defs>
  <filter id="paper" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
    <feColorMatrix values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.15  0 0 0 0.08 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
    <feComposite in="SourceGraphic" operator="over"/>
  </filter>
  <filter id="torn" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="5"/>
    <feDisplacementMap in="SourceGraphic" scale="8"/>
  </filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
    <feOffset dx="0" dy="4"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="mask">
    <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
  </clipPath>
</defs>

<g clip-path="url(#mask)">
  <rect x="0" y="0" width="1024" height="1024" fill="#E8D9B8"/>
  
    <polygon points="140,420 512,280 884,420 512,560" fill="#1a1a1a"/>
    <rect x="240" y="440" width="544" height="60" fill="#1a1a1a"/>
    <line x1="800" y1="420" x2="840" y2="600" stroke="#F8D34A" stroke-width="10"/>
    <circle cx="840" cy="620" r="30" fill="#F8D34A"/>
    <path d="M 220 640 Q 220 500 512 500 Q 804 500 804 640" stroke="#C80306" stroke-width="50" fill="none"/>
    <rect x="180" y="620" width="100" height="180" rx="24" fill="#C80306"/>
    <rect x="744" y="620" width="100" height="180" rx="24" fill="#C80306"/>
    
</g>
</svg>