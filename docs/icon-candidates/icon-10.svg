<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="ts" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
    </filter>
    <filter id="tm" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4"/>
    </filter>
    <filter id="tf" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.4" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3"/>
    </filter>
    <filter id="tx" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="3" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8"/>
    </filter>
    <clipPath id="ios">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#652300" opacity="0.15"/>
    </pattern>
  </defs>
  <g clip-path="url(#ios)">
    <rect x="0" y="0" width="1024" height="1024" fill="#E8D9B8"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#dots)"/>
    <!-- Paper texture speckles -->
    <g opacity="0.1">
      <circle cx="180" cy="220" r="4" fill="#652300"/>
      <circle cx="820" cy="140" r="3" fill="#652300"/>
      <circle cx="740" cy="880" r="5" fill="#652300"/>
      <circle cx="200" cy="820" r="3" fill="#652300"/>
      <circle cx="500" cy="500" r="2" fill="#652300"/>
      <circle cx="360" cy="620" r="4" fill="#652300"/>
      <circle cx="640" cy="380" r="3" fill="#652300"/>
      <circle cx="120" cy="460" r="3" fill="#652300"/>
      <circle cx="900" cy="500" r="4" fill="#652300"/>
      <circle cx="440" cy="180" r="3" fill="#652300"/>
      <circle cx="580" cy="920" r="4" fill="#652300"/>
    </g>
    <!-- Corner confetti shreds - torn paper corners -->
    <g filter="url(#tx)" opacity="0.5">
      <polygon points="60,60 140,80 100,140 40,120" fill="#C80306"/>
      <polygon points="880,60 960,90 920,160 850,130" fill="#284EA9"/>
      <polygon points="60,880 140,860 130,940 50,960" fill="#F8D34A"/>
      <polygon points="880,880 960,900 940,970 860,950" fill="#C14F94"/>
    </g>
    <g filter="url(#tf)" opacity="0.35">
      <circle cx="90" cy="500" r="18" fill="#6B6A4E"/>
      <circle cx="940" cy="620" r="14" fill="#C80306"/>
      <circle cx="150" cy="700" r="12" fill="#284EA9"/>
      <circle cx="880" cy="360" r="16" fill="#F8D34A"/>
    </g>
    <!-- Scattered mini paper triangles for wabi collage feel -->
    <g filter="url(#tx)" opacity="0.28">
      <polygon points="240,140 280,150 260,190" fill="#C14F94"/>
      <polygon points="780,780 820,790 800,830" fill="#652300"/>
      <polygon points="180,380 220,390 200,430" fill="#F8D34A"/>
      <polygon points="820,480 860,490 840,530" fill="#6B6A4E"/>
      <polygon points="440,80 480,90 460,130" fill="#C80306"/>
      <polygon points="560,940 600,950 580,990" fill="#284EA9"/>
    </g>
    <!-- Faint torn horizontal band mid-height for collage layer -->
    <g filter="url(#tx)" opacity="0.12">
      <rect x="0" y="920" width="1024" height="30" fill="#652300"/>
      <rect x="0" y="80" width="1024" height="22" fill="#652300"/>
    </g>
    <g filter="url(#ts)" opacity="0.35" transform="translate(8 10)">
      <path d="M 260 440 Q 260 200 512 180 Q 764 200 764 440 L 764 480 L 700 480 Q 700 260 512 248 Q 324 260 324 480 L 260 480 Z" fill="#2A1A0A"/>
    </g>
    <g filter="url(#ts)">
      <path d="M 260 440 Q 260 200 512 180 Q 764 200 764 440 L 764 480 L 700 480 Q 700 260 512 248 Q 324 260 324 480 L 260 480 Z" fill="#284EA9"/>
    </g>
    <g filter="url(#ts)">
      <ellipse cx="270" cy="540" rx="80" ry="100" fill="#C80306"/>
      <ellipse cx="754" cy="540" rx="80" ry="100" fill="#C80306"/>
      <ellipse cx="270" cy="540" rx="46" ry="60" fill="#F8D34A"/>
      <ellipse cx="754" cy="540" rx="46" ry="60" fill="#F8D34A"/>
    </g>
        <g filter="url(#ts)" opacity="0.35" transform="translate(8 10)">
      <rect x="440" y="500" width="144" height="280" rx="72" fill="#2A1A0A"/>
    </g>
    <g filter="url(#ts)">
      <rect x="440" y="500" width="144" height="280" rx="72" fill="#652300"/>
    </g>
    <g filter="url(#tm)">
      <rect x="460" y="540" width="104" height="200" rx="52" fill="#C14F94"/>
    </g>
        <rect x="460" y="570" width="104" height="6" fill="#652300" opacity="0.6" filter="url(#tf)"/>
    <rect x="460" y="602" width="104" height="6" fill="#652300" opacity="0.6" filter="url(#tf)"/>
    <rect x="460" y="634" width="104" height="6" fill="#652300" opacity="0.6" filter="url(#tf)"/>
    <rect x="460" y="666" width="104" height="6" fill="#652300" opacity="0.6" filter="url(#tf)"/>
    <rect x="460" y="698" width="104" height="6" fill="#652300" opacity="0.6" filter="url(#tf)"/>
    <g filter="url(#ts)"><rect x="490" y="780" width="44" height="80" fill="#652300"/><rect x="420" y="860" width="184" height="24" fill="#652300"/></g>
  </g>
