<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

<defs>
  <filter id="paper" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
    <feColorMatrix values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.15  0 0 0 0.08 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
    <feComposite in="SourceGraphic" operator="over"/>
  </filter>
  <filter id="torn" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="5"/>
    <feDisplacementMap in="SourceGraphic" scale="8"/>
  </filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
    <feOffset dx="0" dy="4"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="mask">
    <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
  </clipPath>
</defs>

<g clip-path="url(#mask)">
  <rect x="0" y="0" width="1024" height="1024" fill="#F5EBD3"/>
  
    <path d="M 260 140 Q 260 380 300 512 Q 260 640 260 900" stroke="#C80306" stroke-width="70" fill="none" stroke-linecap="round"/>
    <path d="M 300 512 Q 500 320 720 180" stroke="#284EA9" stroke-width="70" fill="none" stroke-linecap="round"/>
    <path d="M 300 512 Q 500 700 720 880" stroke="#F8D34A" stroke-width="70" fill="none" stroke-linecap="round"/>
    <circle cx="260" cy="140" r="24" fill="#C80306"/>
    <circle cx="260" cy="900" r="24" fill="#C80306"/>
    <circle cx="720" cy="180" r="24" fill="#284EA9"/>
    <circle cx="720" cy="880" r="24" fill="#F8D34A"/>
    
</g>
</svg>