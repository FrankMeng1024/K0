<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

<defs>
  <filter id="paper" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
    <feColorMatrix values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.15  0 0 0 0.08 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
    <feComposite in="SourceGraphic" operator="over"/>
  </filter>
  <filter id="torn" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="5"/>
    <feDisplacementMap in="SourceGraphic" scale="8"/>
  </filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
    <feOffset dx="0" dy="4"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="mask">
    <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
  </clipPath>
</defs>

<g clip-path="url(#mask)">
  <rect x="0" y="0" width="1024" height="1024" fill="#F5EBD3"/>
  
    <rect x="100" y="422" width="36" height="180" rx="18" fill="#C80306"/><rect x="152" y="352" width="36" height="320" rx="18" fill="#C80306"/><rect x="204" y="412" width="36" height="200" rx="18" fill="#C80306"/><rect x="256" y="282" width="36" height="460" rx="18" fill="#C80306"/><rect x="308" y="372" width="36" height="280" rx="18" fill="#C80306"/><rect x="360" y="232" width="36" height="560" rx="18" fill="#C80306"/><rect x="412" y="322" width="36" height="380" rx="18" fill="#C80306"/><rect x="464" y="192" width="36" height="640" rx="18" fill="#C80306"/><rect x="516" y="302" width="36" height="420" rx="18" fill="#C80306"/><rect x="568" y="162" width="36" height="700" rx="18" fill="#C80306"/><rect x="620" y="322" width="36" height="380" rx="18" fill="#C80306"/><rect x="672" y="192" width="36" height="640" rx="18" fill="#C80306"/><rect x="724" y="372" width="36" height="280" rx="18" fill="#C80306"/><rect x="776" y="232" width="36" height="560" rx="18" fill="#C80306"/><rect x="828" y="412" width="36" height="200" rx="18" fill="#C80306"/><rect x="880" y="352" width="36" height="320" rx="18" fill="#C80306"/><rect x="932" y="422" width="36" height="180" rx="18" fill="#C80306"/>
    
</g>
</svg>