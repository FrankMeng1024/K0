<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

<defs>
  <filter id="paper" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
    <feColorMatrix values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.15  0 0 0 0.08 0"/>
    <feComposite in2="SourceGraphic" operator="in"/>
    <feComposite in="SourceGraphic" operator="over"/>
  </filter>
  <filter id="torn" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="5"/>
    <feDisplacementMap in="SourceGraphic" scale="8"/>
  </filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
    <feOffset dx="0" dy="4"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="mask">
    <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
  </clipPath>
</defs>

<g clip-path="url(#mask)">
  <rect x="0" y="0" width="1024" height="1024" fill="#E8D9B8"/>
  
    <g filter="url(#torn)">
      <rect x="400" y="200" width="224" height="380" rx="112" fill="#C80306"/>
      <rect x="440" y="260" width="30" height="70" fill="#F5EBD3"/>
      <rect x="500" y="260" width="30" height="70" fill="#F5EBD3"/>
      <rect x="560" y="260" width="30" height="70" fill="#F5EBD3"/>
      <path d="M 320 500 Q 320 720 512 720 Q 704 720 704 500" stroke="#284EA9" stroke-width="30" fill="none"/>
      <rect x="490" y="720" width="44" height="120" fill="#652300"/>
      <rect x="380" y="840" width="264" height="30" rx="15" fill="#652300"/>
    </g>
    
</g>
</svg>